services:
  # Web Service
  - type: web
    name: my-portfolio
    env: php
    plan: free
    buildCommand: |
      composer install --no-dev --optimize-autoloader
      php artisan key:generate
      php artisan storage:link
      npm install
      npm run build
    startCommand: php artisan serve --host=0.0.0.0 --port=$PORT
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: false
      - key: APP_KEY
        generate: true
      - key: APP_URL
        value: https://my-portfolio.onrender.com
      - key: CACHE_DRIVER
        value: file
      - key: SESSION_DRIVER
        value: file
      - key: QUEUE_CONNECTION
        value: sync
      - key: LOG_CHANNEL
        value: errorlog
      - key: VIEW_COMPILED_PATH
        value: /opt/render/project/storage/framework/views
      - key: ASSET_URL
        value: https://my-portfolio.onrender.com
    disk:
      name: data
      mountPath: /opt/render/project/storage
      sizeGB: 1

databases:
  - name: portfolio-db
    databaseName: portfolio
    user: portfolio_user
